spring:
  application:
    name: gymdb

  profiles:
    active: local

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{X-Transaction-Id}] %-5level %logger{36} --- %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      all: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

#security:
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichShouldBeLongEnough123456789}
  expiration: ${JWT_EXPIRATION:7200000}

# Brute force settings
security:
  brute-force:
    max-attempts: ${BRUTE_FORCE_MAX_ATTEMPTS:3}
    block-duration-minutes: ${BRUTE_FORCE_BLOCK_DURATION:5}