spring:
  config:
    activate:
      on-profile: stg

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/gymdb_stg
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    root: WARN
    com.epam.gym: INFO