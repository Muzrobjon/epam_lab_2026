spring:
  config:
    activate:
      on-profile: stg

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/gymdb_stg
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: warn