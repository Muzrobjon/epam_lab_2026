# ============================================================
# GYM CRM - PostgreSQL Database Configuration
# ============================================================
# Production-ready configuration for PostgreSQL
# ============================================================

# --------------------------------------------------------
# Database Connection Settings
# --------------------------------------------------------
jdbc.url=jdbc:postgresql://localhost:5432/gymdb
jdbc.username=postgres
jdbc.password=@Designer1980
jdbc.driver=org.postgresql.Driver

# --------------------------------------------------------
# Hibernate Configuration
# --------------------------------------------------------
# Dialect for PostgreSQL
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto Strategy
# Options:
#   - create-drop: Recreate schema on each startup (DEVELOPMENT ONLY)
#   - create: Create schema once, keep data
#   - update: Update schema automatically (RECOMMENDED FOR DEVELOPMENT)
#   - validate: Only validate schema (PRODUCTION)
#   - none: No schema management
hibernate.hbm2ddl.auto=update

# SQL Logging (set to false in production)
hibernate.show_sql=true
hibernate.format_sql=true
hibernate.use_sql_comments=true

# --------------------------------------------------------
# Performance Optimization
# --------------------------------------------------------
# Connection Pool
hibernate.connection.pool_size=10

# Batch Processing
hibernate.jdbc.batch_size=20
hibernate.order_inserts=true
hibernate.order_updates=true
hibernate.jdbc.batch_versioned_data=true

# ID Generation
hibernate.id.new_generator_mappings=true

# Query Optimization
hibernate.jdbc.fetch_size=50

# --------------------------------------------------------
# PostgreSQL Specific Settings
# --------------------------------------------------------
# Use PostgreSQL-specific features
hibernate.jdbc.lob.non_contextual_creation=true

# Timezone handling
hibernate.jdbc.time_zone=UTC

# --------------------------------------------------------
# Logging Configuration
# --------------------------------------------------------
# Application logging
logging.level.com.epam.gym=INFO

# Hibernate SQL logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Data JPA logging
logging.level.org.springframework.orm.jpa=INFO
logging.level.org.springframework.transaction=DEBUG